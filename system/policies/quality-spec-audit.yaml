name: quality-spec-audit
version: "1.0"
description: >
  On every spec completion, run the quality antagonist to detect gaming.
  Flags specs where the only changes are metric command rewrites.

trigger:
  event: boi.spec.completed

action:
  type: script
  command: "python3 ${HEX_SCRIPTS_DIR:-${HEX_ROOT}/system/scripts}/quality-check.py --spec {spec_id}"
  capture_output: true
  emit_on_gaming: hex.quality.gaming.detected
  emit_on_suspect: hex.quality.suspect
  timeout_seconds: 60

on_failure:
  log: true
  continue: true
