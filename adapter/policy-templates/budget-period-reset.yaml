name: budget-period-reset
description: >
  Daily budget period auto-reset with tiered safety gate. Critic-revised
  2026-05-05: zero-budget guard, tiered overage response (1x-2x auto-reset,
  2x-5x WARN+blocked, >5x CRITICAL+blocked), trail entry on reset, period
  length from charter.

requires:
  events:
    - timer.tick.daily

provides:
  events:
    - hex.budget.period_reset
    - hex.budget.overage
    - hex.budget.runaway
    - hex.budget.no_budget

rules:
  - name: budget-period-reset
    trigger:
      event: timer.tick.daily
    actions:
      - type: shell
        command: python3 ${HEX_DIR:-$HOME/hex}/.hex/scripts/health/budget-period-reset.py
        timeout: 120
        on_failure:
          - type: shell
            command: >
              ${HEX_DIR:-$HOME/hex}/.hex/scripts/hex-alert.sh ERROR
              budget-period-reset
              "budget-period-reset.py failed to run (script error)"
